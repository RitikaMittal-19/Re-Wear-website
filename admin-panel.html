<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styles/admin-panel.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/about.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>
    <!-- Header -->
    <!-- ReWear Navbar -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="assets/logo.png" alt="ReWear Logo" class="logo-img">
                </div>

                <nav class="nav desktop-nav">
                    <a href="index.html">Home</a>
                    <a href="dashboard.html">Dashboard</a>
                    <a href="add-item.html">List Item</a>
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                    <a href="admin-panel.html">Admin</a>
                </nav>

                <div class="auth-buttons desktop-auth">
                    <a href="#" class="nav-login-btn" onclick="openModal('loginModal')">Login</a>
                    <a href="#" class="nav-signup-btn" onclick="openModal('signupModal')">Sign Up</a>
                </div>

                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <div class="mobile-menu">
                <nav class="nav desktop-nav">
                    <a href="index.html">Home</a>
                    <a href="dashboard.html">Dashboard</a>
                    <a href="add-item.html">List Item</a>
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                    <a href="admin-panel.html">Admin</a>
                </nav>
                
                <div class="mobile-auth">
                    <a href="#" class="nav-login-btn" onclick="openModal('loginModal')">Login</a>
                    <a href="#" class="nav-signup-btn"" onclick="openModal('signupModal')">Sign Up</a>
                </div>
            </div>
        </div>
        <button data-logout>Logout</button>
    </header>

    <!-- Welcome Header Card -->
    <div class="admin-welcome-card">
        <div class="admin-profile-pic">
            <img src="assets/women1.jpg" alt="Admin Avatar">
        </div>
        <div class="admin-welcome-text">
                       
            <h1 data-user-fullname>Welcome back, Sarah!</h1>
            
            <p data-member-since>Member since March 2023 • 4.9 ⭐ rating</p>
        </div>
        <div class="admin-list-btn">
            <button class="action-btn primary">+ Add New Listing</button>
        </div>
    </div>

    <div class="admin-panel">
        <!-- Header Section -->
        <div class="admin-header">
            <h1 class="admin-title">Admin Panel</h1>
            <div class="header-controls">
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Search...">
                </div>
                <button class="visibility-toggle" id="visibilityToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="users">Manage User</button>
            <button class="nav-tab" data-tab="orders">Manage Orders</button>
            <button class="nav-tab" data-tab="listings">Manage Listings</button>
        </div>

        <!-- Content Sections -->
        <div class="content-container">
            <!-- Manage Users Section -->
            <div class="content-section active" id="users-section">
                <div class="section-header">
                    <h2>Manage Users</h2>
                </div>
               <div class="users-list" data-admin-users>
                  <!-- JS renders real users here -->
                </div>
            </div>
       </div>

            <!-- Manage Orders Section -->
            <div class="content-section" id="orders-section">
                <div class="section-header">
                    <h2>Manage Orders</h2>
                </div>
               <div class="orders-list" data-admin-orders>
                  <!-- JS renders real orders here -->
                </div>
            </div>

            <!-- Manage Listings Section -->
            <div class="content-section" id="listings-section">
                <div class="section-header">
                    <h2>Manage Listings</h2>
                </div>
                <div class="items-list" data-admin-items>
                  <!-- JS renders real listings here -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin-panel.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
